<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klipy Extension Settings</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .options-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .options-header h1 {
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-color);
    }

    .options-header p {
      margin: 0;
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .options-card {
      background-color: var(--surface-color);
      padding: 28px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--input-border);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group:last-of-type {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--input-border);
      border-radius: var(--radius-sm);
      background-color: var(--input-bg);
      color: var(--text-color);
      font-family: "Kanit", sans-serif;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .help-text {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.5;
    }

    .help-text a {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 500;
    }

    .help-text a:hover {
      text-decoration: underline;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-primary {
      flex: 1;
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: "Kanit", sans-serif;
      font-weight: 500;
      font-size: 15px;
      transition: background-color var(--transition), transform var(--transition);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background-color: var(--btn-bg);
      color: var(--text-color);
      border: 1px solid var(--input-border);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: "Kanit", sans-serif;
      font-weight: 400;
      font-size: 15px;
      transition: background-color var(--transition);
    }

    .btn-secondary:hover {
      background-color: var(--btn-hover);
    }

    #status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .status-success {
      background-color: rgba(46, 213, 115, 0.12);
      color: var(--success-color);
      border: 1px solid rgba(46, 213, 115, 0.3);
      display: block !important;
    }

    .status-error {
      background-color: rgba(255, 71, 87, 0.12);
      color: var(--accent-color);
      border: 1px solid rgba(255, 71, 87, 0.3);
      display: block !important;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .theme-toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-top: 1px solid var(--input-border);
      margin-top: 24px;
    }

    .theme-toggle-row span {
      font-size: 14px;
      font-weight: 400;
    }
  </style>
</head>

<body class="light-mode">
  <div class="options-header">
    <h1>⚙️ Extension Settings</h1>
    <p>Configure your Klipy GIF Search extension</p>
  </div>

  <div class="options-card">
    <div class="form-group">
      <label for="apiKey">🔑 Klipy API Key</label>
      <input type="text" id="apiKey" placeholder="Enter your Klipy API Key">
      <div class="help-text">
        Get a free API key from the
        <a href="https://partner.klipy.com/api-keys" target="_blank">Klipy Partner Panel ↗</a>
      </div>
    </div>

    <div class="btn-row">
      <button id="saveBtn" class="btn-primary">Save Settings</button>
    </div>

    <div id="status"></div>

    <div class="theme-toggle-row">
      <span>Theme</span>
      <button id="themeToggle" class="icon-btn" aria-label="Toggle Theme">🌓</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>

</html>
