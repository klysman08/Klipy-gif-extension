<!DOCTYPE html>
<html lang="en" popup>

<head>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;200;300;400;500;600;700&display=swap"
    rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Search</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="light-mode">
  <!-- Header -->
  <header class="header">
    <div class="search-container">
      <input type="text" id="searchQuery" placeholder="Search GIFs..." autocomplete="off">
      <button id="searchButton" aria-label="Search">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>
    <div class="controls">
      <button id="favoritesButton" class="icon-btn" aria-label="Favorites">❤️</button>
      <button id="modeToggle" class="icon-btn" aria-label="Toggle Theme">🌓</button>
      <button id="settingsButton" class="icon-btn" aria-label="Settings">⚙️</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" id="tabSearch" data-tab="search">
      <span class="tab-icon">🔍</span> Search
    </button>
    <button class="tab-btn" id="tabTrending" data-tab="trending">
      <span class="tab-icon">🔥</span> Trending
    </button>
    <button class="tab-btn" id="tabFavorites" data-tab="favorites">
      <span class="tab-icon">❤️</span> Favorites
    </button>
  </nav>

  <!-- Main Content -->
  <main>
    <!-- API Key Warning -->
    <div id="apiKeyWarning" class="api-warning hidden">
      ⚠️ Please configure your Klipy API Key in the
      <a href="#" id="openSettingsLink">settings</a>.
    </div>

    <!-- Loading Spinner -->
    <div id="loadingIndicator" class="loading-spinner hidden">
      <div class="spinner"></div>
      <span class="loading-text">Searching...</span>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <span class="empty-icon">🎞️</span>
      <span class="empty-text">Search for GIFs to get started!</span>
    </div>

    <!-- Trending Tags Section -->
    <div id="trendingSection" class="hidden">
      <div id="trendingTags" class="trending-tags"></div>
      <div id="trendingResults" class="grid-container"></div>
    </div>

    <!-- Search Results -->
    <div id="gifResults" class="grid-container"></div>

    <!-- Favorites Section -->
    <div id="favoritesSection" class="hidden">
      <div id="clearFavoritesBar" class="clear-favorites-bar hidden">
        <span class="fav-count" id="favCount"></span>
        <button class="clear-favorites-btn" id="clearFavoritesBtn">🗑️ Clear All</button>
      </div>
      <div id="favoritesResults" class="grid-container"></div>
    </div>
  </main>

  <!-- Modal for enlarged GIF -->
  <div id="gifModal" class="modal hidden">
    <div class="modal-content">
      <span id="closeModal" class="close-btn">&times;</span>
      <img id="modalImg" src="" alt="Enlarged GIF">
      <div class="modal-actions">
        <button id="copyLinkBtn" class="action-btn">📋 Copy Link</button>
        <button id="downloadBtn" class="action-btn secondary">💾 Download</button>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>

</html>
