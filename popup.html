<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
  <div>
    <input type="text" id="searchQuery" placeholder="Search for GIFs...">
    <button id="searchButton">Search</button>
    <button id="modeToggle">Dark Mode</button>
    <button id="favoritesButton">Favorites</button> <!-- New Favorites Button -->
  </div>
  <div id="gifResults"></div>
  <div id="favoritesResults" style="display: none;"></div> <!-- New Favorites Results Section -->
  <script src="popup.js"></script>
</body>
</html>
