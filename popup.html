<!DOCTYPE html>
<html lang="en" popup>
<head>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
  <header class="header">
    <div class="search-container">
      <input type="text" id="searchQuery" placeholder="Search for GIFs..." autocomplete="off">
      <button id="searchButton" aria-label="Search">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
    </div>
    <div class="controls">
      <button id="favoritesButton" class="icon-btn" aria-label="Favorites">❤️</button>
      <button id="modeToggle" class="icon-btn" aria-label="Toggle Theme">🌓</button>
    </div>
  </header>

  <main>
    <div id="loadingIndicator" class="hidden">Loading...</div>
    <div id="emptyState" class="hidden">No GIFs found. Try another search!</div>
    <div id="gifResults" class="grid-container"></div>
    <div id="favoritesResults" class="grid-container hidden"></div>
  </main>

  <!-- Modal for enlarged GIF -->
  <div id="gifModal" class="modal hidden">
    <div class="modal-content">
      <span id="closeModal" class="close-btn">&times;</span>
      <img id="modalImg" src="" alt="Enlarged GIF">
      <div class="modal-actions">
        <button id="copyLinkBtn" class="action-btn">Copy Link</button>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
